app_builder_version: current
python_bundled:
  path: bin/python
  python_version: 3.12.10
python_venv: null
installer:
  name: app-builder
  install_directory: "%localappdata%\\app-builder"
  icon: app_builder/assets/app-builder.ico
  payload_format: 7z
  dist: dist
  paths:
    include:
      - app_builder
      - app_builder_meta
      - __app_builder_0.x__
      - bin/python
      - pyproject.toml
      - requirements.txt
      - mypy.ini
      - README.md
      - docs
      - app_builder.yaml
    exclude:
      - "**/__pycache__"
      - dist
      - .git
      - .mypy_cache
      - .pytest_cache
  bootstrap_hooks:
    pre_extract:
      - - Write-Host
        - |2
